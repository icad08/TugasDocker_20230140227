<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen font-sans">

<div class="bg-white p-8 rounded-2xl shadow-xl w-96 border border-gray-100">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">Login App</h1>
        <p class="text-gray-500 text-sm mt-2">Silakan masuk menggunakan kredensial Anda</p>
    </div>

    <div th:if="${error}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 rounded mb-5 text-sm" role="alert">
        <p th:text="${error}"></p>
    </div>

    <form action="/login" method="post" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                   placeholder="Masukkan admin">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                   placeholder="Masukkan NIM">
        </div>
        <button type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-2.5 rounded-lg hover:opacity-90 transition-opacity focus:ring-4 focus:ring-blue-300">
            Login
        </button>
    </form>
</div>

</body>
</html>
