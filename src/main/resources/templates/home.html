<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

<nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
        <div class="flex items-center">
            <span class="text-xl font-bold text-gray-800">My Website <span class="text-blue-600" th:text="${userNim}"></span></span>
        </div>
        <div>
            <a href="/logout" class="text-red-500 hover:text-red-700 font-medium transition-colors">Logout</a>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Selamat datang di aplikasi!</h2>
        <p class="text-gray-500 mb-8">Data mahasiswa di bawah ini bersifat temporary.</p>

        <div class="mb-6">
            <a href="/form" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-5 rounded-lg transition-colors inline-flex items-center">
                + Input Data Mahasiswa
            </a>
        </div>

        <h3 class="text-lg font-semibold border-b pb-2 mb-4 text-gray-700">Data Mahasiswa</h3>

        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">No</th>
                    <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Nama</th>
                    <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">NIM</th>
                    <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Jenis Kelamin</th>
                </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="mhs, iterStat : ${mahasiswaList}" class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${iterStat.count}">1</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${mhs.nama}">Budi</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${mhs.nim}">12345</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                <span th:text="${mhs.jenisKelamin}"
                                      th:class="${mhs.jenisKelamin == 'Laki-laki'} ? 'bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-medium' : 'bg-pink-100 text-pink-800 px-2 py-1 rounded text-xs font-medium'">
                                </span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(mahasiswaList)}">
                    <td colspan="4" class="px-6 py-8 text-center text-gray-500 italic">Belum ada data</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
