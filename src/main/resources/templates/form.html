<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen py-10">

<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Form Input Mahasiswa</h2>

        <form action="/form" method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama</label>
                <input type="text" name="nama" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">NIM</label>
                <input type="number" name="nim" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Jenis Kelamin</label>
                <div class="flex items-center space-x-6">
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="jenisKelamin" value="Laki-laki" required class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300">
                        <span class="ml-2 text-gray-700 text-sm">Laki-laki</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="jenisKelamin" value="Perempuan" required class="w-4 h-4 text-pink-600 focus:ring-pink-500 border-gray-300">
                        <span class="ml-2 text-gray-700 text-sm">Perempuan</span>
                    </label>
                </div>
            </div>

            <div class="pt-4 flex items-center justify-between">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                    Submit
                </button>
                <a href="/home" class="text-blue-600 hover:text-blue-800 text-sm font-medium underline transition-colors">
                    Kembali ke Home
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
